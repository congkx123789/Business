query GetReadingPreferences($userId: ID!) {
  readingPreferences(userId: $userId) {
    userId
    backgroundColor
    customBackgroundColor
    fontSize
    lineHeight
    readingMode
    brightness
    tapToToggleControls
    autoHideControls
    controlsTimeout
    syncStatus
    lastSyncedAt
  }
}

mutation UpdateReadingPreferences($input: ReadingPreferencesInput!) {
  updateReadingPreferences(input: $input) {
    userId
    backgroundColor
    customBackgroundColor
    fontSize
    lineHeight
    readingMode
    brightness
    tapToToggleControls
    autoHideControls
    controlsTimeout
    syncStatus
    lastSyncedAt
  }
}


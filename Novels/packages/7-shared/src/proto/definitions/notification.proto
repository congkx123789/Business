syntax = "proto3";

package notification;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service NotificationService {
  rpc SendEmail(SendEmailRequest) returns (NotificationResult);
  rpc SendTemplateEmail(SendTemplateEmailRequest) returns (NotificationResult);
  rpc SendPush(SendPushRequest) returns (NotificationResult);
  rpc SendTemplatePush(SendTemplatePushRequest) returns (NotificationResult);
  rpc SendSms(SendSmsRequest) returns (NotificationResult);
  rpc EnqueueNotification(NotificationEventRequest) returns (NotificationResult);
  rpc GetNotificationPreferences(GetNotificationPreferencesRequest) returns (NotificationPreferences);
  rpc UpdateNotificationPreferences(UpdateNotificationPreferencesRequest) returns (NotificationPreferences);
}

message SendEmailRequest {
  string to = 1;
  string subject = 2;
  string htmlBody = 3;
  optional string textBody = 4;
  repeated EmailAttachment attachments = 5;
  map<string, string> metadata = 6;
  optional string locale = 7;
}

message EmailAttachment {
  string filename = 1;
  bytes content = 2;
  string contentType = 3;
}

message SendTemplateEmailRequest {
  string to = 1;
  string templateId = 2;
  map<string, string> variables = 3;
  map<string, string> metadata = 4;
  optional string locale = 5;
}

message SendPushRequest {
  repeated string tokens = 1;
  string title = 2;
  string body = 3;
  map<string, string> data = 4;
  optional string priority = 5; // high | normal
}

message SendTemplatePushRequest {
  repeated string tokens = 1;
  string templateId = 2;
  map<string, string> variables = 3;
  optional string locale = 4;
}

message SendSmsRequest {
  string to = 1;
  string body = 2;
  optional string senderId = 3;
}

message NotificationEventRequest {
  string eventType = 1;
  string userId = 2;
  map<string, string> data = 3;
  repeated string channels = 4; // email | push | sms
  optional string templateId = 5;
}

message NotificationResult {
  bool accepted = 1;
  string notificationId = 2;
  optional string message = 3;
}

message GetNotificationPreferencesRequest {
  string userId = 1;
}

message UpdateNotificationPreferencesRequest {
  string userId = 1;
  optional bool emailEnabled = 2;
  optional bool pushEnabled = 3;
  optional bool smsEnabled = 4;
  map<string, bool> topics = 5;
  repeated QuietHour quietHours = 6;
}

message NotificationPreferences {
  string userId = 1;
  bool emailEnabled = 2;
  bool pushEnabled = 3;
  bool smsEnabled = 4;
  map<string, bool> topics = 5;
  repeated QuietHour quietHours = 6;
  google.protobuf.Timestamp updatedAt = 7;
}

message QuietHour {
  string startTime = 1;
  string endTime = 2;
  repeated string days = 3; // mon,tue,...
}
name: SBOM Generation

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0.17.9

      - name: Generate SBOMs (source directory) - CycloneDX JSON
        run: |
          syft dir:. -o cyclonedx-json > sbom-cyclonedx.json

      - name: Generate SBOMs (source directory) - SPDX JSON
        run: |
          syft dir:. -o spdx-json > sbom-spdx.json

      - name: Detect Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then echo "found=true" >> $GITHUB_OUTPUT; else echo "found=false" >> $GITHUB_OUTPUT; fi

      - name: Build container image (if Dockerfile)
        if: steps.dockerfile.outputs.found == 'true'
        run: |
          docker build -t local/app:sbom .

      - name: Generate SBOM for container (CycloneDX)
        if: steps.dockerfile.outputs.found == 'true'
        run: |
          syft local/app:sbom -o cyclonedx-json > sbom-image-cyclonedx.json

      - name: Generate SBOM for container (SPDX)
        if: steps.dockerfile.outputs.found == 'true'
        run: |
          syft local/app:sbom -o spdx-json > sbom-image-spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
            sbom-image-cyclonedx.json
            sbom-image-spdx.json
          if-no-files-found: ignore

      - name: Configure AWS Credentials (if bucket provided)
        if: ${{ secrets.SBOM_S3_BUCKET != '' && secrets.SBOM_AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SBOM_AWS_ROLE_ARN }}
          aws-region: ${{ secrets.SBOM_AWS_REGION || 'us-east-1' }}

      - name: Publish SBOMs to S3
        if: ${{ secrets.SBOM_S3_BUCKET != '' && secrets.SBOM_AWS_ROLE_ARN != '' }}
        env:
          BUCKET: ${{ secrets.SBOM_S3_BUCKET }}
        run: |
          KEY_PREFIX="${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/${GITHUB_SHA}"
          aws s3 cp sbom-cyclonedx.json s3://$BUCKET/$KEY_PREFIX/sbom-cyclonedx.json --only-show-errors
          aws s3 cp sbom-spdx.json s3://$BUCKET/$KEY_PREFIX/sbom-spdx.json --only-show-errors
          if [ -f sbom-image-cyclonedx.json ]; then aws s3 cp sbom-image-cyclonedx.json s3://$BUCKET/$KEY_PREFIX/sbom-image-cyclonedx.json --only-show-errors; fi
          if [ -f sbom-image-spdx.json ]; then aws s3 cp sbom-image-spdx.json s3://$BUCKET/$KEY_PREFIX/sbom-image-spdx.json --only-show-errors; fi


name: Secrets Scan

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  trufflehog:
    name: TruffleHog Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@v3
        with:
          # Scan current diff and history; fail on findings
          path: .
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.sha }}
          extra_args: "--fail --only-verified --json --no-update"

  gitguardian:
    name: GitGuardian Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install ggshield
        run: |
          pip install --upgrade ggshield
      - name: GitGuardian scan (CI)
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          ggshield secret scan repo . --all-policies --verbose --exit-zero false


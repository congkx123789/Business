name: Security SAST (Static Analysis)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    # Nightly scan at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit
            p/java
            p/javascript
          severity: ERROR
          strict: false
          # Block PRs on HIGH/CRITICAL findings
          failOnError: true
          
      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep.sarif
          retention-days: 90

  secret-scan:
    name: Secret Scanning (GitGuardian)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Run GitGuardian scan
        uses: GitGuardian/ggshield-action@master
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        with:
          fail_on_secrets: true
          all-policies: true
          
      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitguardian-results
          path: ggshield-report.json
          retention-days: 90

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Run Maven dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'selfcar-backend'
          path: './backend'
          format: 'SARIF'
          args: >
            --enableExperimental
            --failOnCVSS 7
          # Fail on HIGH/CRITICAL (CVSS >= 7)
          
      - name: Upload dependency scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-results
          path: reports/
          retention-days: 90

  npm-audit:
    name: NPM Audit (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Run npm audit
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high --production
          # Fail on HIGH/CRITICAL vulnerabilities
        continue-on-error: false
        
      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results
          path: frontend/npm-audit.json
          retention-days: 90

  report:
    name: Weekly Security Report
    runs-on: ubuntu-latest
    needs: [semgrep, secret-scan, dependency-scan, npm-audit]
    if: github.event_name == 'schedule'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Generate security report
        run: |
          echo "# Weekly Security Scan Report - $(date)" > security-report.md
          echo "Generated: $(date)" >> security-report.md
          echo "" >> security-report.md
          echo "## Scan Summary" >> security-report.md
          echo "- Semgrep: SAST scan completed" >> security-report.md
          echo "- GitGuardian: Secret scanning completed" >> security-report.md
          echo "- Dependency Check: Java dependencies scanned" >> security-report.md
          echo "- NPM Audit: JavaScript dependencies scanned" >> security-report.md
          echo "" >> security-report.md
          echo "See artifacts for detailed findings." >> security-report.md
          
      - name: Upload weekly report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-report
          path: security-report.md


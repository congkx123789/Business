# Application Name
spring.application.name=selfcar-backend

# Server Port
server.port=8080

# H2 Database Configuration (File-Based - Lưu dữ liệu vào file)
# Dữ liệu sẽ được lưu trong: backend/data/selfcar_db.mv.db
spring.datasource.url=jdbc:h2:file:./data/selfcar_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for viewing database at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
# Dùng 'update' thay vì 'create-drop' để giữ dữ liệu khi restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.hbm2ddl.auto=update

# Disable OpenTelemetry for H2 profile (version conflict)
# Disable OAuth2 Client auto-configuration when no OAuth2 providers are configured
spring.autoconfigure.exclude=io.opentelemetry.instrumentation.spring.autoconfigure.OpenTelemetryAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# Frontend URL (used for OAuth2 redirects and CORS)
app.frontend.url=http://localhost:5173

# CORS Configuration (comma-separated for multiple origins)
spring.web.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true


# Production Profile Configuration
# Activate via SPRING_PROFILES_ACTIVE=prod
# IMPORTANT: Set all environment variables before deploying to production!
# 
# SECURITY HARDENING: This file contains NO credentials.
# All secrets MUST be provided via environment variables or secrets manager.
# SecretsManagementService validates all required secrets at startup.

# Database Configuration for Production (MUST be set via environment variables)
# DO NOT put credentials in this file - use environment variables only
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration for Production
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:10}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA Configuration for Production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# Logging Configuration for Production
logging.level.root=WARN
logging.level.com.selfcar=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Error Handling for Production (less verbose for security)
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Frontend URL for Production (MUST be set via environment variable)
app.frontend.url=${APP_FRONTEND_URL}

# CORS Configuration for Production (MUST be set via environment variable)
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
spring.web.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
spring.web.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
spring.web.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# JWT Configuration for Production (MUST be set via environment variable)
# jwt.secret must be at least 256 bits (32 characters) for HS256 algorithm
# DO NOT put JWT secret in this file - use environment variables only
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Payment Gateway Configuration for Production (MUST be set via environment variables)
payment.base-url=${PAYMENT_BASE_URL}

# Momo Payment Gateway (Production)
payment.momo.partner-code=${MOMO_PARTNER_CODE}
payment.momo.access-key=${MOMO_ACCESS_KEY}
payment.momo.secret-key=${MOMO_SECRET_KEY}
payment.momo.environment=${MOMO_ENVIRONMENT:production}
payment.momo.partner-name=${MOMO_PARTNER_NAME:Selfcar}
payment.momo.store-id=${MOMO_STORE_ID:SelfcarStore}

# ZaloPay Payment Gateway (Production)
payment.zalopay.app-id=${ZALOPAY_APP_ID}
payment.zalopay.key1=${ZALOPAY_KEY1}
payment.zalopay.key2=${ZALOPAY_KEY2}
payment.zalopay.environment=${ZALOPAY_ENVIRONMENT:production}

# Stripe Connect Payment Gateway (Production)
payment.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}
payment.stripe.secret-key=${STRIPE_SECRET_KEY}
payment.stripe.connect-client-id=${STRIPE_CONNECT_CLIENT_ID}
payment.stripe.environment=${STRIPE_ENVIRONMENT:production}

# File Upload Configuration for Production
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}

# Security Headers (recommended for production)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Disable DevTools in Production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Performance Optimization for Production
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
spring.jpa.properties.hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider

# Security Hardening Configuration (Week 6-10)

# Rate Limiting Configuration
security.rate-limit.login.max-requests=${RATE_LIMIT_LOGIN_MAX:5}
security.rate-limit.login.window-seconds=${RATE_LIMIT_LOGIN_WINDOW:60}
security.rate-limit.otp.max-requests=${RATE_LIMIT_OTP_MAX:3}
security.rate-limit.otp.window-seconds=${RATE_LIMIT_OTP_WINDOW:300}
security.rate-limit.search.max-requests=${RATE_LIMIT_SEARCH_MAX:30}
security.rate-limit.search.window-seconds=${RATE_LIMIT_SEARCH_WINDOW:60}
security.rate-limit.api.max-requests=${RATE_LIMIT_API_MAX:100}
security.rate-limit.api.window-seconds=${RATE_LIMIT_API_WINDOW:60}
security.rate-limit.global.max-requests=${RATE_LIMIT_GLOBAL_MAX:1000}
security.rate-limit.global.window-seconds=${RATE_LIMIT_GLOBAL_WINDOW:60}

# Bot Detection Configuration
security.bot-detection.enabled=${BOT_DETECTION_ENABLED:true}
security.bot-detection.suspicious-threshold=${BOT_DETECTION_THRESHOLD:10}
security.bot-detection.challenge-on-suspicious=${BOT_CHALLENGE_ENABLED:true}

# Virtual Patching Configuration
security.patching.virtual-patch.enabled=${VIRTUAL_PATCHING_ENABLED:true}
security.patching.slo.high-severity-mitigation-hours=${SLO_HIGH_MITIGATION_HOURS:24}
security.patching.slo.high-severity-patch-days=${SLO_HIGH_PATCH_DAYS:14}
security.patching.slo.medium-severity-mitigation-hours=${SLO_MEDIUM_MITIGATION_HOURS:48}
security.patching.slo.medium-severity-patch-days=${SLO_MEDIUM_PATCH_DAYS:30}

# Actuator & Metrics (production)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.server.port=${MANAGEMENT_PORT:8080}
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.enable.hikari=true
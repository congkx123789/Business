# Application Name
spring.application.name=selfcar-backend

# Server Port (can be overridden by SPRING_PROFILES_ACTIVE or command line)
server.port=${SERVER_PORT:8080}

# Active Profile (default: h2 for local run; override via SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

# Database Configuration (default values for development)
# Override these in application-dev.properties, application-prod.properties, or via environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/selfcar_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration (must be set via environment variables in production)
jwt.secret=${JWT_SECRET:selfcar_secret_key_change_this_in_production_to_a_very_long_secure_random_string_at_least_256_bits}
# 15 minutes (900000 ms)
jwt.expiration=${JWT_EXPIRATION:900000}
# 7 days (604800000 ms)
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Logging Configuration
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.selfcar=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_SQL_BINDER:WARN}

# Error Handling
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:always}
server.error.include-binding-errors=${SERVER_ERROR_INCLUDE_BINDING:always}
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE:never}
server.error.include-exception=${SERVER_ERROR_INCLUDE_EXCEPTION:false}

# CORS Configuration (comma-separated for multiple origins)
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
spring.web.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
spring.web.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
spring.web.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}

# Frontend URL (used for OAuth2 redirects and CORS)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Authentication & Security
auth.login.max-attempts=${AUTH_MAX_ATTEMPTS:5}
auth.login.lockout-duration-minutes=${AUTH_LOCKOUT_MINUTES:15}
auth.login.attempt-window-minutes=${AUTH_ATTEMPT_WINDOW:15}
auth.bcrypt.cost-factor=${BCRYPT_COST_FACTOR:12}
auth.breached-password.enabled=${BREACHED_PASSWORD_CHECK:true}
auth.breached-password.min-count=${BREACHED_PASSWORD_MIN_COUNT:1}

# Webhook Security
webhook.replay-window-minutes=${WEBHOOK_REPLAY_WINDOW:15}
webhook.rate-limit-per-minute=${WEBHOOK_RATE_LIMIT:100}

# Validation Limits
validation.string.max-length=${VALIDATION_STRING_MAX:1000}
validation.email.max-length=${VALIDATION_EMAIL_MAX:255}
validation.password.min-length=${VALIDATION_PASSWORD_MIN:8}
validation.password.max-length=${VALIDATION_PASSWORD_MAX:128}
validation.array.max-size=${VALIDATION_ARRAY_MAX:100}
validation.request-body.max-size=${VALIDATION_BODY_MAX:1048576}

# Payment Gateway Base URL (used for callback URLs)
payment.base-url=${PAYMENT_BASE_URL:https://selfcar.com}

# Platform Fee Configuration
payment.platform-fee-percentage=${PLATFORM_FEE_PERCENTAGE:2.5}

# Momo Payment Gateway Configuration
payment.momo.partner-code=${MOMO_PARTNER_CODE:}
payment.momo.access-key=${MOMO_ACCESS_KEY:}
payment.momo.secret-key=${MOMO_SECRET_KEY:}
payment.momo.environment=${MOMO_ENVIRONMENT:sandbox}
payment.momo.partner-name=${MOMO_PARTNER_NAME:Selfcar}
payment.momo.store-id=${MOMO_STORE_ID:SelfcarStore}

# ZaloPay Payment Gateway Configuration
payment.zalopay.app-id=${ZALOPAY_APP_ID:}
payment.zalopay.key1=${ZALOPAY_KEY1:}
payment.zalopay.key2=${ZALOPAY_KEY2:}
payment.zalopay.environment=${ZALOPAY_ENVIRONMENT:sandbox}

# Stripe Connect Payment Gateway Configuration
payment.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
payment.stripe.secret-key=${STRIPE_SECRET_KEY:}
payment.stripe.connect-client-id=${STRIPE_CONNECT_CLIENT_ID:}
payment.stripe.environment=${STRIPE_ENVIRONMENT:sandbox}


# Actuator & Metrics (dev defaults)
# CQRS / Search integration
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.topic.listings=${KAFKA_TOPIC_LISTINGS:listing-events}
kafka.topic.orders=${KAFKA_TOPIC_ORDERS:orders-events}
kafka.topic.payments=${KAFKA_TOPIC_PAYMENTS:payments-events}
kafka.topic.inventory=${KAFKA_TOPIC_INVENTORY:inventory-events}
search.index.listings=${SEARCH_INDEX_LISTINGS:listings}
elasticsearch.hosts=${ELASTIC_HOSTS:localhost:9200}

# Data lake (local filesystem sink for BI/ML)
datalake.enabled=${DATALAKE_ENABLED:false}
datalake.path=${DATALAKE_PATH:./datalake}
management.endpoints.web.exposure.include=health,info,metrics,prometheus,threaddump,loggers,env
management.endpoint.health.show-details=always
management.server.port=${MANAGEMENT_PORT:8080}
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

# HTTP server metrics
management.observations.http.server.requests.name=http_server_requests

# HTTPS/Proxy & Access Logs (recommended for production behind CDN/ALB)
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:native}
server.tomcat.remoteip.remote-ip-header=${REMOTE_IP_HEADER:x-forwarded-for}
server.tomcat.remoteip.protocol-header=${PROTOCOL_HEADER:x-forwarded-proto}
server.http2.enabled=${HTTP2_ENABLED:true}
server.tomcat.accesslog.enabled=${ACCESS_LOG_ENABLED:true}
server.tomcat.accesslog.pattern=${ACCESS_LOG_PATTERN:common}
server.tomcat.accesslog.rotate=${ACCESS_LOG_ROTATE:true}
server.tomcat.basedir=${TOMCAT_BASEDIR:}

# HikariCP metrics (auto-registered)
management.metrics.enable.hikari=true

# AWS S3 Configuration for Image Storage
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.cdn-domain=${AWS_CDN_DOMAIN:}

# Image CDN Configuration
image.cdn.enabled=${IMAGE_CDN_ENABLED:false}
image.cdn.base-url=${IMAGE_CDN_BASE_URL:}

# Redis Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=${CACHE_TTL:900000} # 15 minutes default (ms)
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=selfcar:
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Multi-Layer Cache TTL Configuration (in minutes)
cache.ttl.static=60
cache.ttl.semi-static=30
cache.ttl.dynamic=15
cache.ttl.inventory=10
cache.ttl.realtime=5

# Cache-Aside Pattern Configuration
cache.aside.enabled=true
cache.aside.compression-threshold=1024
cache.aside.namespace.prefix=selfcar
cache.aside.vdp.ttl=900  # 15 minutes in seconds
cache.aside.search.ttl=300  # 5 minutes in seconds
cache.aside.session.ttl=1800  # 30 minutes in seconds

# Cache Metrics
cache.metrics.enabled=true
cache.metrics.vdp.target-hit-rate=80.0

# Reconciliation
reconciliation.source=${RECON_SOURCE:dealer}
reconciliation.cron=${RECON_CRON:0 */5 * * * *}
dealer.api.base-url=${DEALER_API_BASE_URL:http://localhost:8081}

# CloudFront Invalidation
cloudfront.enabled=${CLOUDFRONT_ENABLED:false}
cloudfront.distribution-id=${CLOUDFRONT_DISTRIBUTION_ID:}

# Google Cloud Translation API Configuration
translation.google.enabled=${GOOGLE_TRANSLATION_ENABLED:false}
translation.google.project-id=${GOOGLE_CLOUD_PROJECT_ID:}
translation.google.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:}
translation.google.api-key=${GOOGLE_TRANSLATION_API_KEY:}
# Free tier: 500,000 characters/month - set quota to stay within free tier
translation.google.free-tier-limit=500000
translation.google.quota-alert-threshold=450000
# Use Basic model (not LLM models - those cost money)
translation.google.model=base

# LibreTranslate Fallback Configuration (self-hosted option)
translation.libretranslate.enabled=${LIBRETRANSLATE_ENABLED:false}
translation.libretranslate.base-url=${LIBRETRANSLATE_BASE_URL:http://localhost:5000}
translation.libretranslate.api-key=${LIBRETRANSLATE_API_KEY:}

# Translation Memory (TM) Cache Configuration
translation.cache.enabled=true
translation.cache.ttl=86400000
translation.cache.max-size=10000

# Translation Glossary Configuration (for brand/auto terms)
translation.glossary.enabled=true
translation.glossary.path=${TRANSLATION_GLOSSARY_PATH:classpath:glossary.json}

# Translation Service Configuration
translation.auto-detect-source=true
translation.max-text-length=5000
translation.batch-size=100

# Translation CLI Configuration (for batch pre-translation)
translation.cli.enabled=false
translation.cli.source-locale=en
translation.cli.target-locale=th
translation.cli.input-path=frontend/src/i18n/locales
translation.cli.output-path=frontend/src/i18n/locales


version: '3.8'

# Production Docker Compose Configuration
# 
# Network Security Hardening:
# - Database in private network (no internet access)
# - Application servers in public network
# - Security groups restrict access between tiers
# - Least-privileged database users
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: selfcar-backend-prod
    ports:
      - "8080:8080"
    environment:
      # All secrets MUST be provided via environment variables or secrets manager
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      # Payment gateway secrets
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY}
      - ZALOPAY_APP_ID=${ZALOPAY_APP_ID}
      - ZALOPAY_KEY1=${ZALOPAY_KEY1}
      - ZALOPAY_KEY2=${ZALOPAY_KEY2}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      # OAuth2 secrets
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
      # Rate limiting configuration
      - RATE_LIMIT_LOGIN_MAX=${RATE_LIMIT_LOGIN_MAX:-5}
      - RATE_LIMIT_OTP_MAX=${RATE_LIMIT_OTP_MAX:-3}
      - RATE_LIMIT_SEARCH_MAX=${RATE_LIMIT_SEARCH_MAX:-30}
      - RATE_LIMIT_API_MAX=${RATE_LIMIT_API_MAX:-100}
      - RATE_LIMIT_GLOBAL_MAX=${RATE_LIMIT_GLOBAL_MAX:-1000}
      # Bot detection
      - BOT_DETECTION_ENABLED=${BOT_DETECTION_ENABLED:-true}
      # Virtual patching
      - VIRTUAL_PATCHING_ENABLED=${VIRTUAL_PATCHING_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: selfcar-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # Database in private network (no public access)
  db:
    image: mysql:8.0
    container_name: selfcar-db-prod
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=selfcar_db
      # Use least-privileged user for application
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
      - ./database/security:/docker-entrypoint-initdb.d/security
    # No public ports - only accessible from app-network
    expose:
      - "3306"
    networks:
      - db-network
    restart: unless-stopped
    # Security: Only allow connections from backend
    command: >
      --bind-address=0.0.0.0
      --skip-networking=0
      --require-secure-transport=OFF
      --max-connections=200
      --max-user-connections=50
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis cache in private network
  redis:
    image: redis:7-alpine
    container_name: selfcar-redis-prod
    # No public ports - only accessible from app-network
    expose:
      - "6379"
    networks:
      - db-network
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_this_password}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy and load balancer
  nginx-lb:
    image: nginx:alpine
    container_name: selfcar-lb-prod
    ports:
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

# Network segmentation for security
networks:
  # Public network for application servers
  app-network:
    driver: bridge
    # Security: Isolated from database network
    internal: false
  
  # Private network for database (no internet access)
  db-network:
    driver: bridge
    # Security: Internal network - no external access
    internal: true

volumes:
  mysql-data:
    driver: local

# Security Notes:
#
# 1. Network Isolation:
#    - Database is in db-network (internal, no internet access)
#    - Application servers are in app-network (public)
#    - Backend connects to database via internal network
#
# 2. Secrets Management:
#    - All secrets MUST be provided via environment variables
#    - Use secrets manager in production (AWS Secrets Manager, Vault, etc.)
#    - Never commit secrets to version control
#
# 3. Database Access:
#    - Database is not exposed to public internet
#    - Only backend service can access database
#    - Use least-privileged database users
#
# 4. Least Privilege:
#    - Each service runs with minimal required permissions
#    - Database user should only have necessary permissions
#    - No root/admin access in production
#
# 5. Monitoring:
#    - Monitor network traffic between services
#    - Alert on unauthorized access attempts
#    - Log all security events


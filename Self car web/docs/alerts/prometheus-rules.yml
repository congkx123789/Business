groups:
  - name: api-health
    rules:
      - alert: HighErrorRate
        expr: sum(rate(http_server_requests_seconds_count{outcome=~"CLIENT_ERROR|SERVER_ERROR"}[5m]))
              /
              sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: page
        annotations:
          summary: High API error rate (>5% over 5m)

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket[10m]))) > 1
        for: 10m
        labels:
          severity: page
        annotations:
          summary: p95 latency > 1s for 10m

      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, sum by (le) (rate(http_server_requests_seconds_bucket[5m]))) > 2
        for: 5m
        labels:
          severity: page
        annotations:
          summary: p99 latency > 2s for 5m

  - name: db
    rules:
      - alert: DBPoolExhaustion
        expr: (hikaricp_connections_active / hikaricp_connections_max) > 0.9
        for: 5m
        labels:
          severity: page
        annotations:
          summary: HikariCP pool usage > 90% for 5m

  - name: webhooks
    rules:
      - alert: WebhookVerificationFailures
        expr: sum(rate(http_server_requests_seconds_count{uri=~"/api/payments/.+/(callback|webhook)",status=~"4..|5.."}[5m])) > 10
        for: 5m
        labels:
          severity: page
        annotations:
          summary: Webhook callback failures > 10/min for 5m

  - name: cache
    rules:
      - alert: VDPDiskCacheHitRateDrop
        expr: (
          sum(rate(cache_hits{namespace="vdp"}[5m]))
          /
          (sum(rate(cache_hits{namespace="vdp"}[5m])) + sum(rate(cache_misses{namespace="vdp"}[5m])))
        ) < 0.8
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: VDP cache hit rate below 80% for 10m
          description: Investigate Redis availability, key versioning, and upstream DB performance.

      - alert: OverallCacheHitRateDrop
        expr: (
          sum(rate(cache_hits[5m]))
          /
          (sum(rate(cache_hits[5m])) + sum(rate(cache_misses[5m])))
        ) < 0.7
        for: 15m
        labels:
          severity: ticket
        annotations:
          summary: Overall cache hit rate below 70% for 15m
          description: Check Redis, hot keys, TTLs, and traffic mix.


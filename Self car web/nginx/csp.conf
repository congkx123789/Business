# Week 6: CSP Report-Only baseline (adjust per env)
add_header Content-Security-Policy-Report-Only "\
  default-src 'self'; \
  base-uri 'none'; \
  object-src 'none'; \
  frame-ancestors 'self'; \
  script-src 'self' 'strict-dynamic'; \
  style-src 'self'; \
  img-src 'self' data:; \
  connect-src 'self' $scheme://api.example.com; \
  frame-src 'self'; \
  upgrade-insecure-requests; \
  report-uri /api/security/csp-report;" always;

# Week 8+: payment isolation example
location /pay/ {
  add_header Content-Security-Policy "\
    default-src 'none'; \
    base-uri 'none'; \
    object-src 'none'; \
    frame-ancestors 'none'; \
    form-action 'self' https://checkout.stripe.com https://payment.momo.vn https://sandbox.zalopay.vn; \
    script-src 'self' https://js.stripe.com https://checkout.stripe.com; \
    style-src 'self'; \
    img-src 'self' data: https://*.stripe.com; \
    font-src 'self' data:; \
    connect-src 'self' $scheme://api.example.com https://api.stripe.com; \
    frame-src https://checkout.stripe.com; \
    upgrade-insecure-requests; \
    report-uri /api/security/csp-report;" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), usb=(), payment=(self)" always;
}


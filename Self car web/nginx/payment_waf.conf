# Example NGINX + ModSecurity WAF rules for payment routes
# Phase 1: Baseline in log-only (DetectionOnly), then switch to On (blocking)

modsecurity on;
modsecurity_rules 'SecRuleEngine DetectionOnly';

# Include OWASP CRS if available
# modsecurity_rules_file /etc/nginx/modsec/modsecurity.conf;
# modsecurity_rules_file /etc/nginx/modsec/crs-setup.conf;
# modsecurity_rules_file /etc/nginx/modsec/rules/*.conf;

location ~* ^/(payment|api/payments)/ {
    # Example custom rules to protect payment endpoints
    modsecurity_rules '
        SecAction \
            "id:900100,phase:1,pass,log,ctl:ruleEngine=DetectionOnly,\
            msg:Baseline log-only for payment routes" 
    ';

    # Block obvious bad user-agents (switch to Deny after baseline)
    modsecurity_rules '
        SecRule REQUEST_HEADERS:User-Agent "(?i)(sqlmap|nikto|crawler|scanner)" \
            "id:910100,phase:1,deny,status:403,log,msg:Bad UA on payment route" 
    ';
}

# To switch to blocking mode after baseline:
# modsecurity_rules 'SecRuleEngine On';


